<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        h2 {
            margin-bottom: 20px;
        }

        .input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        .input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 5px rgba(34,197,94,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #3b82f6;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }
    </style>

</head>

<body>

<div class="card">

    <h2>📝 Register</h2>

    <!-- FLASH MESAJ -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="{{ 'alert-error' if category == 'error' else 'alert-success' }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">

        <input class="input" type="text" name="username"
               placeholder="Username"
               value="{{ request.form.username }}" required>

        <input class="input" type="email" name="email"
               placeholder="Email"
               value="{{ request.form.email }}" required>

        <input class="input" type="password" name="password"
               placeholder="Password" required>

        <button class="btn" type="submit">Register</button>

    </form>

    <a class="link" href="/login">
        Already have an account? Log in
    </a>

</div>

</body>
</html>
