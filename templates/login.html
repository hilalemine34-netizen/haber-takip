<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
    body {
        background: linear-gradient(135deg, #1e293b, #0f172a);
        font-family: 'Segoe UI', sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card {
        background: #ffffff;
        padding: 35px;
        border-radius: 16px;
        width: 350px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        text-align: center;
    }

    .input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border:none;
        background: #3b82f6;
        color:white;
    }

    .btn-secondary {
        background: #64748b;
    }

    .alert {
        background:#fee2e2;
        padding:10px;
        border-radius:10px;
        margin-top:10px;
        color:#b91c1c;
    }
    </style>

</head>

<body>

<div class="card">

    <h2>🔐 Log in</h2>

    <form method="POST">

        <input class="input" type="text" name="username" placeholder="Username"
            value="{{ request.form.username }}" required>

        <input class="input" type="password" name="password" placeholder="Password" required>

        <button class="btn" type="submit">Log in</button>

    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <br>

    <a href="/register">
        <button class="btn btn-secondary">
            Register
        </button>
    </a>

</div>

</body>
</html>
